services:
  cronosxsecret:
    image: ghcr.io/mrgarbonzo/cronos-secret:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - SECRET_AI_API_KEY
      - SECRET_AI_URL
      - DASHBOARD_API_KEY
      - EXPLORER_API_KEY
      - CHAIN_ID
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
