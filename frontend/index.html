<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cronos AI Agent — Private &amp; Attested</title>
<style>
  :root {
    --bg: #0d0d10;
    --panel: #141418;
    --panel-2: #1c1c22;
    --border: #2a2a35;
    --text: #f2f2f5;
    --muted: #888899;
    --accent: #e84b17;
    --accent-hover: #f05a28;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
    overflow: hidden;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  header .title { display: flex; flex-direction: column; }
  header .title h1 { margin: 0; font-size: 16px; font-weight: 600; color: #fff; }
  header .title .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .secretvm-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: rgba(16, 185, 129, 0.15);
    color: var(--green);
    border: 1px solid rgba(16, 185, 129, 0.35);
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .secretvm-badge::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
  }

  /* Main 3-panel layout */
  main {
    flex: 1; display: flex; gap: 12px;
    padding: 12px; min-height: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .panel h2 {
    margin: 0 0 12px 0;
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-chat { flex: 0 0 65%; }
  .panel-attestation { flex: 1 1 auto; }

  /* Chat panel */
  .chat-header-row { display: flex; align-items: center; justify-content: space-between; }
  .clear-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-size: 11px;
    padding: 2px 8px; border-radius: 4px; cursor: pointer;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--muted); }
  .messages {
    flex: 1; overflow-y: auto; min-height: 0;
    display: flex; flex-direction: column; gap: 10px;
    padding: 4px;
  }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }
  .msg.agent { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
  .msg.loading { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); }
  .dot-typing::after {
    content: "●"; display: inline-block; animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .suggestions button {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--muted); font-size: 11px;
    padding: 5px 10px; border-radius: 999px; cursor: pointer;
  }
  .suggestions button:hover { color: var(--text); border-color: var(--accent); }

  .input-row { display: flex; gap: 8px; margin-top: 10px; }
  .input-row input {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 6px;
    font-family: inherit; font-size: 13px;
  }
  .input-row input:focus { outline: none; border-color: var(--accent); }
  .input-row button {
    background: var(--accent); border: none; color: #fff;
    padding: 0 16px; border-radius: 6px; cursor: pointer; font-weight: 600;
  }
  .input-row button:hover:not(:disabled) { background: var(--accent-hover); }
  .input-row button:disabled, .input-row input:disabled {
    opacity: 0.5; cursor: not-allowed;
  }

  /* Inline tool-call summary (replaces the old Agent Response panel) */
  .tool-summary {
    display: block;
    align-self: flex-start;
    margin: 4px 0 0 0;
    background: transparent;
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .tool-summary .line { display: block; }
  .tool-summary .ok { color: var(--green); }
  .tool-summary .bad { color: var(--red); }

  /* Attestation panel */
  .att-status {
    display: inline-block; padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; margin-bottom: 10px;
  }
  .att-status.green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.4); }
  .att-status.yellow { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.4); }
  .att-status.red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.4); }

  .att-source {
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
  }
  .att-source .label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
  .att-source .repo { font-family: monospace; color: var(--text); margin-top: 3px; word-break: break-all; }
  .att-source .commit { font-family: monospace; color: var(--muted); margin-top: 2px; }
  .att-source a {
    display: inline-block; margin-top: 6px;
    color: var(--accent); text-decoration: none;
    border: 1px solid var(--accent);
    padding: 3px 8px; border-radius: 4px;
    font-weight: 600;
  }
  .att-source a:hover { background: var(--accent); color: #fff; }

  .att-rows { flex: 1; overflow-y: auto; min-height: 0; }
  .att-row {
    padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 6px;
    background: var(--panel-2);
  }
  .att-row .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .att-row .value {
    font-family: monospace; font-size: 11px; margin-top: 3px;
    word-break: break-all; cursor: pointer; color: var(--text);
  }
  .att-row .annotation { font-size: 10px; color: var(--muted); margin-top: 3px; font-style: italic; }

  .att-meta { margin-top: 10px; font-size: 11px; color: var(--muted); }
  .att-meta .tcb { font-family: monospace; color: var(--text); }
  .att-errors { margin-top: 8px; font-size: 11px; color: var(--red); }

  /* Two-section attestation layout */
  .panel-attestation h2 .att-subtitle {
    font-size: 10px; font-weight: 500; text-transform: none;
    letter-spacing: 0; color: var(--muted);
  }
  .att-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .att-section { margin-bottom: 6px; }
  .att-section + .att-section { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .att-section-header {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .att-section-header::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .att-section.secretai .att-section-header::before { background: var(--accent); }
  .att-section .att-rows { flex: none; overflow: visible; }
  .att-llm-info {
    font-size: 11px; margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .att-llm-info .row { display: flex; justify-content: space-between; gap: 8px; }
  .att-llm-info .k { color: var(--muted); }
  .att-llm-info .v { font-family: monospace; color: var(--text); word-break: break-all; text-align: right; }
  .att-section-note {
    font-size: 10px; color: var(--muted); font-style: italic;
    margin-top: -4px; margin-bottom: 8px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <h1>Cronos AI Agent</h1>
      <div class="subtitle">Powered by SecretAI (qwen3:8b) — Private &amp; Attested</div>
    </div>
    <div class="secretvm-badge">SecretVM</div>
  </header>

  <main>
    <!-- Chat panel -->
    <section class="panel panel-chat">
      <h2 class="chat-header-row">
        <span>Chat</span>
        <button class="clear-btn" id="clearBtn">clear context</button>
      </h2>
      <div class="messages" id="messages"></div>
      <div class="suggestions" id="suggestions">
        <button data-q="What is the latest Cronos block?">Latest block</button>
        <button data-q="Get the balance of 0x8995909DC0960FC9c75B6031D683124a4016825b">Get a balance</button>
        <button data-q="Show me details of block 18000000 on Cronos">Block 18,000,000</button>
        <button data-q="What time is it?">What time is it?</button>
      </div>
      <div class="input-row">
        <input id="queryInput" type="text" placeholder="Ask about Cronos..." autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </section>

    <!-- Attestation panel -->
    <section class="panel panel-attestation">
      <h2>
        <span>🔒 TEE Attestation</span>
        <span class="att-subtitle">Two separate hardware boundaries</span>
      </h2>
      <div class="att-scroll">

        <!-- Section 1: This agent's SecretVM -->
        <div class="att-section agent">
          <div class="att-section-header">This Agent — SecretVM</div>
          <div id="attStatus" class="att-status yellow">⏳ Loading</div>
          <div class="att-source" id="attSource"></div>
          <div class="att-rows" id="attRows"></div>
          <div class="att-meta" id="attMeta"></div>
          <div class="att-errors" id="attErrors"></div>
        </div>

        <!-- Section 2: SecretAI LLM's SecretVM -->
        <div class="att-section secretai">
          <div class="att-section-header">SecretAI LLM — SecretVM</div>
          <div id="saStatus" class="att-status yellow">⏳ Loading</div>
          <div class="att-section-note" id="saNote"></div>
          <div class="att-llm-info" id="saInfo"></div>
          <div class="att-rows" id="saRows"></div>
          <div class="att-meta" id="saMeta"></div>
          <div class="att-errors" id="saErrors"></div>
        </div>

      </div>
    </section>
  </main>
</div>

<script>
  const BACKEND_URL = window.location.origin.startsWith('http')
    ? window.location.origin
    : 'http://localhost:3000';

  let context = [];
  let inFlight = false;
  let lastAttestationAt = null;

  const $ = (id) => document.getElementById(id);
  const messagesEl = $('messages');
  const inputEl = $('queryInput');
  const sendBtn = $('sendBtn');
  const clearBtn = $('clearBtn');
  const suggestionsEl = $('suggestions');
  const attStatusEl = $('attStatus');
  const attRowsEl = $('attRows');
  const attMetaEl = $('attMeta');
  const attErrorsEl = $('attErrors');
  const saStatusEl = $('saStatus');
  const saRowsEl = $('saRows');
  const saMetaEl = $('saMeta');
  const saErrorsEl = $('saErrors');
  const saInfoEl = $('saInfo');
  const saNoteEl = $('saNote');

  function truncate(s) {
    if (!s || typeof s !== 'string') return '(empty)';
    if (s.length <= 28) return s;
    return s.slice(0, 16) + '...' + s.slice(-8);
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addLoadingMessage() {
    const div = document.createElement('div');
    div.className = 'msg loading';
    div.innerHTML = 'Thinking <span class="dot-typing"></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function renderToolSummary(functionResponses) {
    if (!functionResponses || functionResponses.length === 0) return;

    const box = document.createElement('div');
    box.className = 'tool-summary';

    functionResponses.forEach((fr) => {
      const status = fr.status || 'Unknown';
      const ok = status === 'Success';
      const data = fr.data || {};
      const name = data.name || data.functionName || data.tool || '';
      // Pick a compact hint of the payload: prefer the stringified data
      // minus the common wrapper noise, then truncate to 60 chars.
      let hint;
      if (typeof data === 'object' && data !== null) {
        if ('message' in data && !ok) {
          hint = String(data.message);
        } else {
          hint = JSON.stringify(data);
        }
      } else {
        hint = String(data);
      }
      if (hint.length > 60) hint = hint.slice(0, 57) + '...';

      const line = document.createElement('span');
      line.className = 'line';
      const mark = document.createElement('span');
      mark.className = ok ? 'ok' : 'bad';
      mark.textContent = ok ? '✓' : '✗';
      line.appendChild(mark);
      line.appendChild(document.createTextNode(' ' + (name ? name + ' → ' : '') + hint));
      box.appendChild(line);
    });

    messagesEl.appendChild(box);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendQuery(query) {
    if (inFlight || !query.trim()) return;
    inFlight = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;

    if (suggestionsEl) { suggestionsEl.style.display = 'none'; }

    addMessage('user', query);
    const loadingEl = addLoadingMessage();

    let agentBubble = null;
    let fullText = '';
    let lastFunctionResponses = [];

    const handleEvent = (event) => {
      if (event.type === 'tools') {
        lastFunctionResponses = event.functionResponses || [];
        if (loadingEl && loadingEl.parentNode) loadingEl.remove();
        agentBubble = addMessage('agent', '');
      } else if (event.type === 'token') {
        if (!agentBubble) {
          // No tools event arrived — model had nothing to call. Initialize now.
          if (loadingEl && loadingEl.parentNode) loadingEl.remove();
          agentBubble = addMessage('agent', '');
        }
        fullText += event.content || '';
        agentBubble.textContent = fullText;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else if (event.type === 'done') {
        context = event.context || context;
        renderToolSummary(lastFunctionResponses);
      } else if (event.type === 'error') {
        if (loadingEl && loadingEl.parentNode) loadingEl.remove();
        addMessage('agent', '⚠ Error: ' + (event.message || 'unknown'));
      }
    };

    try {
      const res = await fetch(BACKEND_URL + '/api/query/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, context }),
      });

      if (!res.ok || !res.body) {
        throw new Error('HTTP ' + res.status);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let sepIndex;
        while ((sepIndex = buffer.indexOf('\n\n')) !== -1) {
          const rawEvent = buffer.slice(0, sepIndex);
          buffer = buffer.slice(sepIndex + 2);
          for (const line of rawEvent.split('\n')) {
            if (line.startsWith('data: ')) {
              const payload = line.slice(6);
              try {
                handleEvent(JSON.parse(payload));
              } catch (e) {
                console.error('bad SSE payload', payload, e);
              }
            }
          }
        }
      }
    } catch (e) {
      if (loadingEl && loadingEl.parentNode) loadingEl.remove();
      addMessage('agent', '⚠ Network error: ' + e.message);
    } finally {
      inFlight = false;
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.value = '';
      inputEl.focus();
      fetchAllAttestations();
    }
  }

  function renderAttestation(data) {
    lastAttestationAt = Date.now();
    const report = data.report || {};
    const isMock = data.mock === true;
    const isValid = data.valid === true;

    attStatusEl.className = 'att-status ' + (isMock ? 'yellow' : isValid ? 'green' : 'red');
    attStatusEl.textContent = isMock ? '⚠ Mock Data' : isValid ? '✓ Attested' : '✗ Invalid';

    // Source provenance — closes the attestation loop by linking out to the
    // exact commit the running image was built from.
    const src = data.source;
    const attSourceEl = document.getElementById('attSource');
    if (src && src.repo) {
      const shortSha = src.commit && src.commit !== 'unknown' ? src.commit.slice(0, 12) : 'unknown';
      const linkHref = src.commitUrl || src.repoUrl;
      const linkText = src.commit && src.commit !== 'unknown' ? 'View commit on GitHub →' : 'View repo on GitHub →';
      attSourceEl.innerHTML =
        '<div class="label">Source</div>' +
        '<div class="repo">' + src.repo + '</div>' +
        '<div class="commit">' + shortSha + '</div>' +
        '<a href="' + linkHref + '" target="_blank" rel="noopener noreferrer">' + linkText + '</a>';
    } else {
      attSourceEl.innerHTML = '';
    }

    const fields = [
      ['MR_TD', report.mr_td, false],
      ['RTMR0', report.rt_mr0, false],
      ['RTMR1', report.rt_mr1, false],
      ['RTMR2', report.rt_mr2, false],
      ['RTMR3', report.rt_mr3, true],
      ['REPORT_DATA', report.report_data, false],
    ];

    attRowsEl.innerHTML = '';
    fields.forEach(([label, value, highlight]) => {
      const row = document.createElement('div');
      row.className = 'att-row' + (highlight ? ' rtmr3' : '');
      const lbl = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = label;
      const val = document.createElement('div');
      val.className = 'value';
      val.textContent = truncate(value);
      val.title = value || '(empty)';
      let expanded = false;
      val.addEventListener('click', () => {
        expanded = !expanded;
        val.textContent = expanded ? (value || '(empty)') : truncate(value);
      });
      row.appendChild(lbl);
      row.appendChild(val);
      if (highlight) {
        const ann = document.createElement('div');
        ann.className = 'annotation';
        ann.textContent = 'Proves docker-compose.yaml integrity';
        row.appendChild(ann);
      }
      attRowsEl.appendChild(row);
    });

    attMetaEl.innerHTML =
      '<div>TCB status: <span class="tcb">' + (report.tcb_status || 'unknown') + '</span></div>' +
      '<div id="attAge">Last verified: just now</div>';

    if (data.errors && data.errors.length > 0) {
      attErrorsEl.textContent = data.errors.join(' · ');
    } else {
      attErrorsEl.textContent = '';
    }
  }

  function updateAttestationAge() {
    if (!lastAttestationAt) return;
    const ageEl = document.getElementById('attAge');
    if (!ageEl) return;
    const s = Math.floor((Date.now() - lastAttestationAt) / 1000);
    ageEl.textContent = 'Last verified: ' + (s < 1 ? 'just now' : s + 's ago');
  }

  function setStatusBadge(el, data) {
    const isMock = data && data.mock === true;
    const isValid = data && data.valid === true;
    el.className = 'att-status ' + (isMock ? 'yellow' : isValid ? 'green' : 'red');
    el.textContent = isMock ? '⚠ Mock Data' : isValid ? '✓ Attested' : '✗ Invalid';
  }

  function renderSecretAIAttestation(data) {
    const report = data.report || {};
    setStatusBadge(saStatusEl, data);

    saNoteEl.textContent = data.mock
      ? 'SecretAI attestation port may require network access'
      : '';

    saInfoEl.innerHTML =
      '<div class="row"><span class="k">Model</span><span class="v">' + (data.model || 'unknown') + '</span></div>' +
      '<div class="row"><span class="k">Endpoint</span><span class="v">' + (data.endpoint || 'unknown') + '</span></div>';

    // Compact: only MR_TD and RTMR3 (the integrity measurement)
    const fields = [
      ['MR_TD', report.mr_td, false],
      ['RTMR3', report.rt_mr3, true],
    ];

    saRowsEl.innerHTML = '';
    fields.forEach(([label, value, highlight]) => {
      const row = document.createElement('div');
      row.className = 'att-row' + (highlight ? ' rtmr3' : '');
      const lbl = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = label;
      const val = document.createElement('div');
      val.className = 'value';
      val.textContent = truncate(value);
      val.title = value || '(empty)';
      let expanded = false;
      val.addEventListener('click', () => {
        expanded = !expanded;
        val.textContent = expanded ? (value || '(empty)') : truncate(value);
      });
      row.appendChild(lbl);
      row.appendChild(val);
      if (highlight) {
        const ann = document.createElement('div');
        ann.className = 'annotation';
        ann.textContent = 'Proves docker-compose.yaml integrity';
        row.appendChild(ann);
      }
      saRowsEl.appendChild(row);
    });

    saMetaEl.innerHTML =
      '<div>TCB status: <span class="tcb">' + (report.tcb_status || 'unknown') + '</span></div>';

    saErrorsEl.textContent = (data.errors && data.errors.length > 0)
      ? data.errors.join(' · ')
      : '';
  }

  async function fetchAllAttestations() {
    const results = await Promise.allSettled([
      fetch(BACKEND_URL + '/api/attestation').then((r) => r.json()),
      fetch(BACKEND_URL + '/api/secretai-attestation').then((r) => r.json()),
    ]);

    const [agentResult, secretaiResult] = results;

    if (agentResult.status === 'fulfilled') {
      renderAttestation(agentResult.value);
    } else {
      attStatusEl.className = 'att-status red';
      attStatusEl.textContent = '✗ Unreachable';
      attErrorsEl.textContent = agentResult.reason?.message || 'fetch failed';
    }

    if (secretaiResult.status === 'fulfilled') {
      renderSecretAIAttestation(secretaiResult.value);
    } else {
      saStatusEl.className = 'att-status red';
      saStatusEl.textContent = '✗ Unreachable';
      saErrorsEl.textContent = secretaiResult.reason?.message || 'fetch failed';
    }
  }

  // wire up
  sendBtn.addEventListener('click', () => sendQuery(inputEl.value));
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendQuery(inputEl.value);
  });
  clearBtn.addEventListener('click', () => {
    context = [];
    messagesEl.innerHTML = '';
    if (suggestionsEl) suggestionsEl.style.display = 'flex';
  });
  suggestionsEl.querySelectorAll('button').forEach((btn) => {
    btn.addEventListener('click', () => {
      inputEl.value = btn.dataset.q;
      sendQuery(btn.dataset.q);
    });
  });

  fetchAllAttestations();
  setInterval(updateAttestationAge, 1000);
</script>
</body>
</html>
